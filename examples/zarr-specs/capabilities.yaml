# yaml-language-server: $schema=../../capabilities.schema.json
last_updated: 2026-03-18
version: 1
is_definition: true
spec:
  zarr3:
    codec:
      blosc:
        meta:
          description: Bytes-to-bytes codec using blosc.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/codecs/blosc/index.html
        decode: true
        decode_partial: true
        encode: true
        encode_partial: false
      bytes:
        meta:
          description: Array-to-bytes codec defining endianness of multi-byte types.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/codecs/bytes/index.html
        decode: true
        decode_partial: true
        encode: true
        encode_partial: true
      crc32c:
        meta:
          description: Bytes-to-bytes codec providing fast checksums.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/codecs/crc32c/index.html
        decode: true
        decode_partial: true
        encode: true
        encode_partial: false
      gzip:
        meta:
          description: Bytes-to-bytes codec for compression with broad support.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/codecs/gzip/index.html
        decode: true
        decode_partial: false
        encode: true
        encode_partial: false
      sharding:
        meta:
          description: Array-to-bytes codec for efficient random access within chunks.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/codecs/sharding-indexed/index.html
        decode: true
        decode_partial: true
        encode: true
        encode_partial: true
      transpose:
        meta:
          description: Array-to-array codec for changing memory representation of chunks.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/codecs/transpose/index.html
        decode: true
        decode_partial: true
        encode: true
        encode_partial: true
    chunk_grid:
      regular:
        meta:
          description: Every chunk has identical shape.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/chunk-grids/regular-grid/index.html
        support: true
    chunk_key_encoding:
      default:
        meta:
          description: Chunks exist under a `c/` storage prefix, with an extra storage prefix per dimension.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/chunk-key-encodings/default/index.html
        support: true
      v2:
        meta:
          description: Chunking compatible with Zarr v2.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/chunk-key-encodings/v2/index.html
        support: true
    data_type:
      bool:
        meta:
          description: 1-byte boolean where 0 is false and anything else is true.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      int8:
        meta:
          description: 1-byte signed integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      int16:
        meta:
          description: 2-byte signed integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      int32:
        meta:
          description: 4-byte signed integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      int64:
        meta:
          description: 8-byte signed integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      uint8:
        meta:
          description: 1-byte unsigned integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      uint16:
        meta:
          description: 2-byte unsigned integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      uint32:
        meta:
          description: 4-byte unsigned integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      uint64:
        meta:
          description: 8-byte unsigned integer.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      float16:
        meta:
          description: IEEE 754 half-precision floating point; sign bit, 5 bits exponent, 10 bits mantissa
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
          notes: Support is optional.
        support: true
      float32:
        meta:
          description: IEEE 754 single-precision floating point; sign bit, 8 bits exponent, 23 bits mantissa
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      float64:
        meta:
          description: IEEE 754 double-precision floating point; sign bit, 11 bits exponent, 52 bits mantissa
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      complex64:
        meta:
          description: real and complex components are each IEEE 754 single-precision floating point
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      complex128:
        meta:
          description: real and complex components are each IEEE 754 double-precision floating point
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
        support: true
      r*:
        meta:
          description: raw bits, variable size given by *, limited to be a multiple of 8
          url: https://zarr-specs.readthedocs.io/en/latest/v3/data-types/index.html#core-data-types
          notes: Support for raw bits is optional.
        support: true
    store:
      filesystem:
        read: true
        read_partial: true
        list: true
        write: true
        write_partial: true
        meta:
          alias:
            - file
            - fs
          description: Zarr storage abstraction for file systems.
          url: https://zarr-specs.readthedocs.io/en/latest/v3/stores/filesystem/index.html
          notes: Different file systems may impose restrictions on e.g. key casing.
